<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Tasty Restaurant</title>

<link rel="stylesheet" href="styles.css">

<style>
.contact{
    max-width:700px;
    margin:50px auto;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.contact h1{
    text-align:center;
    color:#d62828;
    margin-bottom:20px;
}

.contact input,
.contact textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.contact button{
    width:100%;
    padding:12px;
    background:#d62828;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

.contact button:hover{
    background:#a61e1e;
}

.info{
    text-align:center;
    margin-top:30px;
    line-height:30px;
}
</style>

</head>

<body>

<header>
<div class="logo">🍴 Tasty Restaurant</div>

<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<div class="contact">

<h1>Contact Us</h1>

<form>
<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<input type="tel" placeholder="Mobile Number" required>

<textarea rows="5" placeholder="Your Message"></textarea>

<button type="submit">Send Message</button>
</form>

<div class="info">
<p><b>📍 Address:</b> Guntur, Andhra Pradesh</p>
<p><b>📞 Phone:</b> +91 9876543210</p>
<p><b>✉️ Email:</b> tastyrestaurant@gmail.com</p>
</div>

</div>

<footer>
<p>© 2026 Tasty Restaurant | All Rights Reserved</p>
</footer>

<script src="script.js"></script>

</body>
</html>
